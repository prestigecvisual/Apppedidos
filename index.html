<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>App Pedidos - Prestige Comunicação Visual</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- LOGO -->
  <header style="text-align:center; margin:20px 0;">
    <img src="img/logo.png" alt="Logo" style="width:180px;">
    <h1>App Pedidos</h1>
  </header>

  <!-- FORMULÁRIO DE PRODUTOS -->
  <section style="margin:20px;">
    <h2>Novo Produto</h2>
    <select id="produto">
      <option value="">Selecione um produto</option>
    </select>
    <input type="number" id="largura" placeholder="Largura (cm)">
    <input type="number" id="altura" placeholder="Altura (cm)">
    <input type="number" id="quantidade" placeholder="Quantidade">
    <button onclick="adicionarItem()">Adicionar ao Carrinho</button>

    <div id="resultado" style="margin-top:10px;"></div>
  </section>

  <!-- PRODUTO PERSONALIZADO -->
  <section style="margin:20px;">
    <h2>Adicionar Produto Personalizado</h2>
    <input type="text" id="novoProdutoNome" placeholder="Nome do produto">
    <input type="number" id="novoProdutoPreco" placeholder="Preço unitário">
    <button onclick="adicionarProdutoPersonalizado()">Adicionar Produto</button>
  </section>

  <!-- CARRINHO -->
  <section style="margin:20px;">
    <h2>Carrinho</h2>
    <div id="listaItens"></div>
  </section>

  <!-- TOTAIS -->
  <section id="totais" style="margin:20px;">
    <h2>Totais</h2>
    <p>Frete: R$ <span id="frete">0.00</span></p>
    <p>Desconto: R$ <span id="desconto">0.00</span></p>
    <p>Total Geral: R$ <span id="totalGeral">0.00</span></p>
  </section>

  <button id="gerarPDF" style="margin:20px;">Gerar PDF</button>

  <!-- INFORMAÇÕES DO CLIENTE -->
  <section style="margin:20px;">
    <h2>Informações do Cliente</h2>
    <input type="text" id="clienteNome" placeholder="Nome do cliente">
    <input type="text" id="clienteContato" placeholder="Contato (ex: WhatsApp)">
    <input type="text" id="clienteTelefone" placeholder="Telefone">
    <input type="text" id="clienteEndereco" placeholder="Endereço">
    <input type="text" id="clienteCEP" placeholder="CEP do cliente" maxlength="8">
    <button onclick="salvarOrcamento()">Enviar Orçamento via WhatsApp</button>
  </section>

  <!-- LISTA DE ORÇAMENTOS -->
  <section style="margin:20px;">
    <h2>Orçamentos</h2>
    <div id="listaOrcamentos"></div>
  </section>

  <!-- LISTA DE PEDIDOS -->
  <section style="margin:20px;">
    <h2>Pedidos</h2>
    <div id="listaPedidos"></div>
  </section>

  <!-- SCRIPTS -->
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
