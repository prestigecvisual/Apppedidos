<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige - Sistema de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <h1>Prestige Comunicação Visual</h1>
            <p>Orçamento Ref: <span id="numeroOrcamento">--/--/--</span></p>
        </div>
    </header>

    <main class="container content-grid">
        <div class="left-col">
            
            <section class="card admin-section">
                <h3>+ Adicionar Produto à Tabela</h3>
                <div class="grid-form">
                    <input type="text" id="novoProdNome" placeholder="Ex: Letra Caixa">
                    <input type="number" id="novoProdPreco" placeholder="Preço (R$)">
                    <select id="novoProdTipo">
                        <option value="m2">Cobrar por m²</option>
                        <option value="unid">Cobrar por Unidade</option>
                    </select>
                    <button onclick="cadastrarNovoProduto()" class="btn-green">Salvar na Tabela</button>
                </div>
            </section>

            <section class="card">
                <h3>Dados do Cliente</h3>
                <div class="grid-form">
                    <input type="text" id="clienteNome" class="full" placeholder="Nome / Razão Social">
                    <input type="text" id="clienteDoc" placeholder="CPF / CNPJ">
                    <input type="text" id="clienteCEP" placeholder="CEP (Frete automático)">
                </div>
            </section>

            <section class="card highlight">
                <h3>Calculadora de Pedido</h3>
                <div class="grid-form">
                    <select id="produto" class="full" onchange="toggleMedidas()"></select>
                    <div id="medidasInput" class="grid-form full" style="display: flex; gap: 10px;">
                        <input type="number" id="largura" placeholder="Largura (cm)" value="100">
                        <input type="number" id="altura" placeholder="Altura (cm)" value="100">
                    </div>
                    <input type="number" id="quantidade" placeholder="Qtd" value="1">
                    <button onclick="adicionarItem()" class="btn-blue">Adicionar ao Carrinho</button>
                </div>
                <div id="resultado" class="feedback"></div>
            </section>
        </div>

        <div class="right-col">
            <section class="card cart-card">
                <h3>Resumo do Orçamento</h3>
                <div id="listaItens" class="item-list"></div>
                
                <div class="pgto-box">
                    <label>Forma de Pagamento:</label>
                    <select id="formaPagamento" onchange="calcularTotais()">
                        <option value="pix">PIX / Dinheiro (-5%)</option>
                        <option value="debito">Débito (Valor Normal)</option>
                        <option value="credito_3x">Crédito até 3x (+6%)</option>
                        <option value="credito_5x">Crédito até 5x (+7%)</option>
                    </select>
                </div>

                <div class="totals-area">
                    <p>Frete: R$ <span id="frete">0.00</span></p>
                    <p>Taxas/Desc: R$ <span id="desconto">0.00</span></p>
                    <hr>
                    <h4>Total Geral: R$ <span id="totalGeral">0.00</span></h4>
                </div>

                <button onclick="salvarOrcamento()" class="btn-save">💾 Salvar no Histórico</button>
                <button id="gerarPDF" class="btn-pdf">📄 Baixar PDF</button>
                
                <div class="historico-area">
                    <h4>Últimos Orçamentos:</h4>
                    <div id="listaOrcamentos"></div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
