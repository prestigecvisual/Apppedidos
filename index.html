<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Pedidos - Orçamento</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h2 { text-align: center; }
  table { border-collapse: collapse; width: 100%; margin-top: 10px; }
  th, td { border: 1px solid #000; padding: 5px; text-align: center; }
  th { background-color: #f0f0f0; }
  input { width: 60px; }
  #total-container { margin-top: 10px; font-size: 16px; font-weight: bold; }
  button { margin-top: 10px; padding: 8px 12px; cursor: pointer; }
  #add-produto { margin-bottom: 10px; }
</style>
</head>
<body>

<div>
  <img src="logo.png" alt="Logo" style="width:150px; display:block; margin:auto;">
  <h2>Orçamento App Pedidos</h2>
  <p>Número do Orçamento: <span id="numero-orcamento"></span></p>
  <p>Data: <span id="data-orcamento"></span></p>
</div>

<button id="add-produto">Adicionar Produto</button>

<table id="produtos">
  <thead>
    <tr>
      <th>Produto</th>
      <th>Quantidade</th>
      <th>Valor Unitário (R$)</th>
      <th>Subtotal (R$)</th>
      <th>Remover</th>
    </tr>
  </thead>
  <tbody>
    <!-- Linhas adicionadas dinamicamente -->
  </tbody>
</table>

<div id="total-container">
  <p>Frete: R$ <span id="frete">0</span></p>
  <p>Desconto: R$ <span id="desconto">0</span></p>
  <p>Total: R$ <span id="total">0</span></p>
</div>

<button id="calcular">Calcular Total</button>
<button id="gerarPDF">Gerar PDF</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
