<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestige Comunicação Visual - Sistema de Pedidos</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="js/db.js"></script>
    <script src="js/app.js" defer></script>
</head>
<body>

    <header class="main-header">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
            <div>
                <h1 style="margin: 0;">Prestige Comunicação Visual</h1>
                <p style="margin: 5px 0 0 0;">Sistema de Orçamentos & Pedidos</p>
            </div>
            <div style="text-align: right;">
                <p><strong>Ref. Orçamento:</strong> <span id="numeroOrcamento">--/--/--</span></p>
            </div>
        </div>
    </header>

    <main class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
        
        <div class="col-entrada">
            
            <section class="card" style="background: #f0fdf4; border: 1px solid #bbf7d0; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <h3 style="color: #166534; margin-top: 0;">+ Adicionar Produto à Tabela</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="novoProdNome" placeholder="Nome (Ex: Letra Caixa)" style="grid-column: span 2; padding: 8px;">
                    <input type="number" id="novoProdPreco" placeholder="Preço (R$)" style="padding: 8px;">
                    <select id="novoProdTipo" style="padding: 8px;">
                        <option value="m2">Cobrar por m²</option>
                        <option value="unid">Cobrar por Unidade</option>
                    </select>
                    <button onclick="cadastrarNovoProduto()" style="grid-column: span 2; background: #10b981; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px;">💾 Salvar na Tabela de Preços</button>
                </div>
            </section>

            <section class="card" style="background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <h3 style="margin-top: 0;">Dados do Cliente</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="text" id="clienteNome" placeholder="Nome / Razão Social" style="grid-column: span 2; padding: 8px;">
                    <input type="text" id="clienteDoc" placeholder="CPF / CNPJ" style="padding: 8px;">
                    <input type="text" id="clienteCEP" placeholder="CEP (Frete automático)" style="padding: 8px;">
                    
                    <input type="text" id="clienteEndereco" placeholder="Endereço: Rua/Avenida, Bairro, Cidade" style="grid-column: span 2; padding: 8px;">
                </div>
            </section>

            <section class="card" style="background: #eff6ff; border: 1px solid #bfdbfe; padding: 20px; border-radius: 8px;">
                <h3 style="color: #1e40af; margin-top: 0;">Calculadora de Pedido</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <select id="produto" onchange="toggleMedidas()" style="grid-column: span 2; padding: 8px;"></select>
                    
                    <div id="medidasInput" style="grid-column: span 2; display: flex; gap: 10px;">
                        <input type="number" id="largura" placeholder="Largura (cm)" value="100" style="flex: 1; padding: 8px;">
                        <input type="number" id="altura" placeholder="Altura (cm)" value="100" style="flex: 1; padding: 8px;">
                    </div>
                    
                    <input type="number" id="quantidade" placeholder="Qtd" value="1" style="grid-column: span 2; padding: 8px;">
                    
                    <button onclick="adicionarItem()" style="grid-column: span 2; background: #3b82f6; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px;">🛒 Adicionar ao Carrinho</button>
                </div>
                <div id="resultado" style="margin-top: 15px; font-size: 0.9em; color: #1e40af;"></div>
            </section>
        </div>

        <div class="col-resumo">
            <section class="card" style="background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 8px; position: sticky; top: 20px;">
                <h3 style="margin-top: 0;">Resumo do Orçamento</h3>
                
                <div id="listaItens" style="min-height: 100px; border-bottom: 1px solid #eee; margin-bottom: 15px; padding-bottom: 10px;">
                    </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.8em; margin-bottom: 5px;">Forma de Pagamento:</label>
                    <select id="formaPagamento" onchange="calcularTotais()" style="width: 100%; padding: 8px;">
                        <option value="pix">PIX / Dinheiro (-5%)</option>
                        <option value="debito">Débito (Valor Normal)</option>
                        <option value="credito_3x">Crédito até 3x (+6%)</option>
                        <option value="credito_5x">Crédito até 5x (+7%)</option>
                    </select>
                </div>

                <div style="background: #f9fafb; padding: 15px; border-radius: 4px; margin-bottom: 15px;">
                    <p style="display: flex; justify-content: space-between; margin: 5px 0;"><span>Frete:</span> <span>R$ <span id="frete">0.00</span></span></p>
                    <p style="display: flex; justify-content: space-between; margin: 5px 0;"><span>Taxa/Desc:</span> <span>R$ <span id="desconto">0.00</span></span></p>
                    <hr>
                    <h4 style="display: flex; justify-content: space-between; margin: 10px 0;"><span>Total Geral:</span> <span>R$ <span id="totalGeral">0.00</span></span></h4>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button onclick="salvarOrcamento()" style="background: #6b7280; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px;">💾 Salvar</button>
                    <button id="gerarPDF" style="background: #ef4444; color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px;">📄 PDF</button>
                </div>

                <div style="margin-top: 20px;">
                    <h4 style="font-size: 0.8em; color: #666; text-transform: uppercase;">Últimos Orçamentos:</h4>
                    <div id="listaOrcamentos" style="font-size: 0.8em; max-height: 150px; overflow-y: auto;"></div>
                </div>
            </section>
        </div>

    </main>

</body>
</html>
