<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>App Pedidos - Prestige Comunicação Visual</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/db.js"></script> <!-- Sempre primeiro -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/app.js" defer></script>
</head>
<body>
  <header>
    <img src="img/logo.png" alt="Logo" style="height:60px;">
    <h1>App Pedidos - Prestige Comunicação Visual</h1>
  </header>

  <section>
    <h2>Novo Item</h2>
    <label>Produto:</label>
    <select id="produto"></select><br>
    <label>Largura (cm):</label>
    <input type="number" id="largura" min="1"><br>
    <label>Altura (cm):</label>
    <input type="number" id="altura" min="1"><br>
    <label>Quantidade:</label>
    <input type="number" id="quantidade" min="1" value="1"><br>
    <button onclick="adicionarItem()">Adicionar ao Carrinho</button>
    <div id="resultado"></div>
  </section>

  <section>
    <h2>Carrinho</h2>
    <div id="listaItens"></div>
    <div>
      <strong>Frete:</strong> R$ <span id="frete">0</span><br>
      <strong>Desconto:</strong> R$ <span id="desconto">0</span><br>
      <strong>Total Geral:</strong> R$ <span id="totalGeral">0</span>
    </div>
  </section>

  <section>
    <h2>Adicionar Produto Personalizado</h2>
    <label>Nome:</label>
    <input type="text" id="novoProdutoNome"><br>
    <label>Preço:</label>
    <input type="number" id="novoProdutoPreco" min="0"><br>
    <button onclick="adicionarProdutoPersonalizado()">Adicionar Produto</button>
  </section>

  <section>
    <h2>Cliente</h2>
    <label>Nome:</label>
    <input type="text" id="clienteNome"><br>
    <label>Contato:</label>
    <input type="text" id="clienteContato"><br>
    <label>Telefone:</label>
    <input type="text" id="clienteTelefone"><br>
    <label>Endereço:</label>
    <input type="text" id="clienteEndereco"><br>
    <label>CEP:</label>
    <input type="text" id="clienteCEP"><br>
    <button onclick="salvarOrcamento()">Salvar Orçamento</button>
    <button id="gerarPDF">Gerar PDF</button>
  </section>

  <section>
    <h2>Orçamentos</h2>
    <div id="listaOrcamentos"></div>
  </section>

  <section>
    <h2>Pedidos</h2>
    <div id="listaPedidos"></div>
  </section>

  <section>
    <h2>Dashboard</h2>
    <div>Orçamentos totais: <span id="totalOrcamentos">0</span></div>
    <div>Orçamentos aprovados: <span id="totalAprovados">0</span></div>
    <div>Pedidos: <span id="totalPedidos">0</span></div>
  </section>

</body>
</html>
